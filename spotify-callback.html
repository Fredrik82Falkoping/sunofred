<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Authorization Callback</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #191414;
            color: #fff;
        }
        h1 {
            color: #1DB954;
        }
        .token-box {
            background: #282828;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            word-break: break-all;
        }
        .copy-btn {
            background: #1DB954;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #1ed760;
        }
        .error {
            color: #ff4444;
        }
        .success {
            color: #1DB954;
        }
        code {
            background: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
        .instructions {
            background: #282828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <h1>🎵 Spotify Authorization</h1>
    <div id="content">
        <p>Processing authorization...</p>
    </div>

    <script>
        async function handleCallback() {
            const contentDiv = document.getElementById('content');
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');

            if (error) {
                contentDiv.innerHTML = `
                    <h2 class="error">❌ Authorization Failed</h2>
                    <p>Error: ${error}</p>
                    <p>Please try again or check your Spotify app settings.</p>
                `;
                return;
            }

            if (!code) {
                contentDiv.innerHTML = `
                    <h2>🎵 Get Spotify Refresh Token</h2>
                    <div class="instructions">
                        <h3>Setup (First Time Only):</h3>
                        <ol>
                            <li>Go to <a href="https://developer.spotify.com/dashboard" target="_blank">Spotify Dashboard</a></li>
                            <li>Select your app</li>
                            <li>Click <strong>Settings</strong></li>
                            <li>Add this Redirect URI:<br>
                                <code>https://fredrik82falkoping.github.io/sunofred/spotify-callback.html</code>
                            </li>
                            <li>Click <strong>Save</strong></li>
                        </ol>
                        <h3>Get Token:</h3>
                        <button class="copy-btn" onclick="startAuth()">🔐 Authorize with Spotify</button>
                    </div>
                `;
                return;
            }

            // We have a code, exchange it for tokens
            await exchangeCodeForToken();
        }

        async function startAuth() {
            const clientId = 'c8c60427f0284bbbbee8da8e55f6713c';
            const redirectUri = 'https://fredrik82falkoping.github.io/sunofred/spotify-callback.html';
            const scopes = 'user-read-private user-read-email';
            
            const authUrl = `https://accounts.spotify.com/authorize?` +
                `response_type=code&` +
                `client_id=${clientId}&` +
                `scope=${encodeURIComponent(scopes)}&` +
                `redirect_uri=${encodeURIComponent(redirectUri)}`;
            
            window.location.href = authUrl;
        }
        
        async function exchangeCodeForToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (!code) return;
            
            const clientId = 'c8c60427f0284bbbbee8da8e55f6713c';
            const clientSecret = prompt('Enter your SPOTIFY_CLIENT_SECRET:');
            const redirectUri = 'https://fredrik82falkoping.github.io/sunofred/spotify-callback.html';
            
            if (!clientSecret) {
                alert('Client secret is required!');
                return;
            }
            
            try {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Authorization': 'Basic ' + btoa(clientId + ':' + clientSecret)
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: redirectUri
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error_description || data.error);
                }
                
                // Show the tokens
                document.getElementById('content').innerHTML = `
                    <h2 class="success">✅ Success! Tokens Retrieved</h2>
                    
                    <h3>🔑 Refresh Token (add to .env):</h3>
                    <div class="token-box">
                        <code id="refresh-token">${data.refresh_token}</code>
                        <button class="copy-btn" onclick="copyToClipboard('refresh-token')">📋 Copy Refresh Token</button>
                    </div>
                    
                    <h3>Access Token (expires in ${data.expires_in}s):</h3>
                    <div class="token-box">
                        <code id="access-token">${data.access_token}</code>
                        <button class="copy-btn" onclick="copyToClipboard('access-token')">📋 Copy Access Token</button>
                    </div>
                    
                    <div class="instructions">
                        <h3>📝 Next Steps:</h3>
                        <ol>
                            <li>Copy the refresh token above</li>
                            <li>Add it to your <code>.env</code> file: <code>SPOTIFY_REFRESH_TOKEN=...</code></li>
                            <li>Run <code>npm run sync</code></li>
                        </ol>
                    </div>
                `;
                
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <h2 class="error">❌ Error</h2>
                    <p>${err.message}</p>
                    <p>Make sure your client secret is correct.</p>
                `;
            }
        }
        
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        // Run on page load
        handleCallback();
    </script>
</body>
</html>
