name: Spotify Sync

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: github-pages
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install node-fetch @supabase/supabase-js

      - name: Debug environment
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=========================================="
          echo "🔍 DEBUGGING ENVIRONMENT VARIABLES"
          echo "=========================================="
          echo ""
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo ""
          echo "--- Checking Secrets ---"
          echo "Secret defined in GitHub: LASTFM_API_KEY = ${{ secrets.LASTFM_API_KEY != '' }}"
          echo "Secret defined in GitHub: SUPABASE_URL = ${{ secrets.SUPABASE_URL != '' }}"
          echo "Secret defined in GitHub: SUPABASE_SERVICE_ROLE_KEY = ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}"
          echo ""
          echo "--- Checking Environment Variables ---"
          if [ -z "$LASTFM_API_KEY" ]; then
            echo "❌ LASTFM_API_KEY is EMPTY or NOT SET"
          else
            echo "✅ LASTFM_API_KEY is set (length: ${#LASTFM_API_KEY} chars)"
            echo "   First 8 chars: ${LASTFM_API_KEY:0:8}..."
          fi
          
          if [ -z "$SUPABASE_URL" ]; then
            echo "❌ SUPABASE_URL is EMPTY or NOT SET"
          else
            echo "✅ SUPABASE_URL is set: $SUPABASE_URL"
          fi
          
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "❌ SUPABASE_SERVICE_ROLE_KEY is EMPTY or NOT SET"
          else
            echo "✅ SUPABASE_SERVICE_ROLE_KEY is set (length: ${#SUPABASE_SERVICE_ROLE_KEY} chars)"
          fi
          echo "=========================================="

      - name: Run sync script
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node sync.js
