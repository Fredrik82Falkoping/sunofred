<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category | Sun of Red</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/browse.css">
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <span class="eyebrow">Sun of Red</span>
            <h1>Sun of Red</h1>
            <p>Indie pop exploring reason, history and compassion.</p>
        </div>
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="browse.html">Explore</a>
            <a href="login.html">Admin</a>
        </nav>
    </header>

    <main>
        <section class="section">
            <div class="section-intro">
                <a href="browse.html" class="back-link">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to explore
                </a>
                <span>Category</span>
                <div style="display: flex; gap: 24px; align-items: flex-start; width: 100%;">
                    
                    <div style="flex: 1;">
                        <h2 id="categoryName">Loading...</h2>
                        <p id="categoryDescription">All tracks in this category</p>
                    </div>

                    <div id="categoryImageContainer" style="display: none;">
                        <img 
                            id="categoryImage" 
                            style="width: 200px; height: 200px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" 
                        />
                    </div>

                </div>

                <div class="section-actions" style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
                    <button id="prevTrackBtn" class="button secondary" type="button" disabled>
                        Föregående
                    </button>
                    <button id="playAllBtn" class="button primary" type="button" disabled>
                        Play All
                    </button>
                    <button id="nextTrackBtn" class="button secondary" type="button" disabled>
                        Nästa
                    </button>
                    <div id="nowPlayingLabel" class="now-playing">
                        Now playing: No song
                    </div>
                </div>

            <div id="tracksContainer" class="tracks-container">
                <div class="loading">Loading tracks...</div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2025 Sun of Red. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/language-filter.js"></script>
    <script src="assets/js/category.js"></script>
</body>
</html>
