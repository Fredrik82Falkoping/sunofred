<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Music | Sun of Red</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/browse.css">
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <span class="eyebrow">Sun of Red</span>
            <h1>Sun of Red</h1>
            <p>Indie pop exploring reason, history and compassion.</p>
        </div>
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="browse.html" class="active">Explore</a>
        </nav>
    </header>

    <main>
        <!-- Language Filter -->
        <section class="language-filter-section">
            <div id="languageFilter"></div>
        </section>

        <!-- Categories Section -->
        <section class="section">
            <div class="section-intro">
                <span>Explore</span>
                <h2>Music Categories</h2>
                <p>Browse songs by theme and topic</p>
            </div>
            <div class="categories-grid" id="categoriesGrid">
                <p style="text-align: center; color: #6b7280;">Loading categories...</p>
            </div>
        </section>

        <!-- Tags Section -->
        <section class="section">
            <div class="section-intro">
                <span>Discover</span>
                <h2>Tags</h2>
                <p>Find songs by mood and style</p>
            </div>
            <div class="tags-cloud" id="tagsCloud">
                <p style="text-align: center; color: #6b7280;">Loading tags...</p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2025 Sun of Red. All rights reserved.</p>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Config & Utilities -->
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/language-filter.js"></script>
    
    <!-- Models (Data Layer) -->
    <script src="assets/js/models/Category.js"></script>
    <script src="assets/js/models/Tag.js"></script>
    
    <!-- UI Logic (View/Controller) -->
    <script src="assets/js/browse.js"></script>
</body>
</html>
